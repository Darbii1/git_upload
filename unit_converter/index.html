<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <title>CovertX</title>
    <link rel="stylesheet" href="style.css">
    
  </head>
  <body>
      <button id="nightToggle" class="night-toggle">🌙 Night Mode</button>
      <div id="container">
        <h1 class="main-title">Covert<span class="x-letter">X</span></h1>
        <p id="move">metric/ unit conversion. convert smarter and faster</p>
        <h3>Enter Value:</h3>
        <input type="number" id="inputEL" />
        <button id="submit">Convert</button>
      </div>
      
      <div class="results-section">
        <div id="box">
          <h1>Length(Meter/Feet)</h1>
          <p id="result"></p>
        </div>
        <div id="box">
          <h1>Volume(Litters/Gallons)</h1>
          <p id="result"></p>
        </div>
        <div id="box">
          <h1>Mass(Kilograms/Pounds)</h1>
          <p id="result"></p>
        </div>
      </div>
         
        <div class="watermark">~ Darbii_dev.</div>
        
    

    <script src="index.js"></script>
   </body>
</html>
